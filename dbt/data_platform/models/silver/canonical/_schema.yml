version: 2

models:
  - name: team
    description: >
      Canonical team entity (silver), conformed from ESPN + the team_aliases seed.
      One row per canonical team; seeded aliases resolve to the seed's team_id,
      unseen ESPN names mint md5(lower(name)). Seed-only (no auto-learn).
    columns:
      - name: team_id
        description: "Internal canonical team identifier (seed team_id, else md5(lower(name)))."
        data_tests:
          - not_null
          - unique
      - name: name
        description: "Primary display name (seed canonical_name, else the ESPN name)."
        data_tests:
          - not_null
      - name: similar_names
        description: "Alternative names/aliases (seed aliases, else [name])."

  - name: league
    description: "Canonical competition entity (silver), conformed from ESPN."
    columns:
      - name: league_id
        description: "Internal canonical competition identifier (md5(league_slug))."
        data_tests:
          - not_null
          - unique
      - name: name
        description: "League display name (ESPN league slug)."
        data_tests:
          - not_null
      - name: is_tournament
        description: "True for knockout/group tournaments."
        data_tests:
          - not_null

  - name: season
    description: >
      Canonical season/edition of a competition (silver), conformed from ESPN. One
      row per edition of a league (e.g. the 2025-26 Premier League).
    columns:
      - name: season_id
        description: "Internal canonical season identifier (md5(league_id || '|' || season_year))."
        data_tests:
          - not_null
          - unique
      - name: league_id
        description: "FK -> league.league_id."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('league')
                field: league_id
      - name: name
        description: "Season label (ESPN season_display, e.g. '2025-26')."

  - name: match
    description: "Canonical fixture entity (silver), conformed from ESPN."
    columns:
      - name: match_id
        description: "Internal canonical fixture identifier (canonical_match_id macro)."
        data_tests:
          - not_null
          - unique
      - name: season_id
        description: "FK -> season.season_id (league reached via season.league_id)."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('season')
                field: season_id
      - name: home_team_id
        description: "FK -> team.team_id (home)."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('team')
                field: team_id
      - name: away_team_id
        description: "FK -> team.team_id (away)."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('team')
                field: team_id

  - name: espn_match_link
    description: >
      Maps each ESPN event to its canonical match. One row per ESPN event;
      `match_id` is recomputed by the SAME resolution + canonical_match_id macro as
      `match`, so it equals `match.match_id` (the relationships test catches drift).
      The provenance columns are the forward-compatible linkage seam: ESPN resolves
      deterministically (1.0 / auto_confirmed); a future fuzzy/confidence engine
      writes lower-confidence / needs-review rows here additively.
    columns:
      - name: link_id
        description: "PK. Deterministic surrogate md5(espn_event_id) (stable across re-runs)."
        data_tests:
          - not_null
          - unique
      - name: match_id
        description: "FK -> match.match_id (recomputed identically to match.sql)."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('match')
                field: match_id
      - name: espn_event_id
        description: "Raw ESPN event id (provider reference; NOT a match_id input). One link per event."
        data_tests:
          - not_null
          - unique
      - name: match_method
        description: "How the link was made. ESPN: always 'deterministic'."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["deterministic"]
      - name: confidence
        description: "Linkage confidence (DOUBLE). ESPN deterministic match: 1.0."
        data_tests:
          - not_null
      - name: review_status
        description: "Review state of the link. ESPN: always 'auto_confirmed'."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["auto_confirmed"]

  - name: matchbook_event_link
    description: "Maps a canonical match to a Matchbook exchange event."
    columns:
      - name: link_id
        data_tests:
          - not_null
          - unique
      - name: match_id
        description: "FK -> match.match_id."

  - name: football_data_match_link
    description: >
      Maps a canonical match to a football-data.co.uk source row via a composite
      natural key (the source has no stable match id).
    columns:
      - name: link_id
        data_tests:
          - not_null
          - unique
      - name: match_id
        description: "FK -> match.match_id."
      - name: family
        description: "'main' | 'extra' (which football-data.co.uk dataset family)."
      - name: country
        description: "Country (extra family only; null for main)."
      - name: division
        description: "Div (main) / League (extra)."
      - name: season
        description: "Season token."
      - name: match_date
        description: "Raw source match date."
      - name: home_team
        description: "Raw source home team name."
      - name: away_team
        description: "Raw source away team name."
