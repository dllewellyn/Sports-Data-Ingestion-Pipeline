version: 2

models:
  - name: stg_espn_events
    description: "Typed ESPN events (one row per event) staged from bronze ESPN Parquet."
    columns:
      - name: espn_event_id
        description: "ESPN's native event id (natural key, one row per event)."
        data_tests:
          - not_null
      - name: kickoff_time
        description: "Kick-off as a UTC timestamp parsed from ESPN's ISO-8601 date."

  - name: stg_matchbook_odds
    description: "Silver staging view over Matchbook bronze Parquet — faithful projection, no enrichment."
    columns:
      - name: event_id
        tests:
          - not_null
      - name: market_id
        tests:
          - not_null
      - name: runner_id
        tests:
          - not_null
      - name: ingested_at
        tests:
          - not_null
