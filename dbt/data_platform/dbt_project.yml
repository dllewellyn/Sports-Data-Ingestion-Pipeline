name: data_platform
version: "1.0.0"
config-version: 2

profile: data_platform

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  data_platform:
    silver:
      +materialized: view
      +schema: silver
      # Canonical domain tables (team/league/match + link tables) are real,
      # writable relations, not transforms — materialize them as tables.
      canonical:
        +materialized: table
    gold:
      +materialized: table
      +schema: gold
