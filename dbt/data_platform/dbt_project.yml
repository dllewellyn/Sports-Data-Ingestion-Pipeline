name: data_platform
version: "1.0.0"
config-version: 2

profile: data_platform

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  data_platform:
    +database: lake
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: table
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
      exports:
        +materialized: external

seeds:
  data_platform:
    +database: lake
    +schema: staging
    team_aliases:
      # Curated canonical-team + alias seed: one row per (team, alias). The
      # conform `team` model joins incoming names to `alias` to resolve a stable
      # `team_id`, and array_aggs `alias` into `team.similar_names`. Seed-only
      # (no auto-learn). `team_id` is the md5 of lower(canonical_name).
      +column_types:
        team_id: varchar
        canonical_name: varchar
        alias: varchar

tests:
  data_platform:
    +database: lake
