data_platform:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', '/app/data/warehouse.duckdb') }}"
      threads: 4
      extensions:
        - parquet
        - postgres
        - ducklake
      attach:
        - path: "ducklake:{{ env_var('POSTGRES_CATALOG_URL', 'postgres:dbname=ducklake user=ducklake password=ducklake host=ducklake-catalog port=5432') }}"
          alias: lake
