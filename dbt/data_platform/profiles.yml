data_platform:
  target: dev
  outputs:
    dev:
      type: duckdb
      # Same DuckDB file the Dagster gold export reads.
      path: "{{ env_var('DUCKDB_PATH', '/app/data/warehouse.duckdb') }}"
      threads: 4
      extensions:
        - parquet
        - ducklake
      attach:
        - path: "ducklake:{{ env_var('POSTGRES_CATALOG_URL', 'postgresql://ducklake:ducklake@ducklake-catalog:5432/ducklake') }}"
          alias: lake
