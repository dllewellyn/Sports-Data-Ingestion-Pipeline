name: data-platform

# Environment-NEUTRAL base. It defines the app services and nothing about where
# telemetry goes or whether SigNoz runs. Always combine it with exactly one
# overlay (selected by COMPOSE_FILE in .env):
#   dev  -> docker-compose.yml : docker-compose.signoz.yml  (self-hosted SigNoz)
#   prod -> docker-compose.yml : docker-compose.prod.yml    (external collector)
#
# Shared config block for the three Python services (they all run the same image).
x-app: &app
  build:
    context: .
    dockerfile: Dockerfile
  image: data-platform:local
  env_file: .env
  restart: unless-stopped
  environment:
    DAGSTER_HOME: /app/.dagster
    DATA_DIR: /app/data
    DUCKDB_PATH: /app/data/warehouse.duckdb
    POSTGRES_CATALOG_URL: "postgres:dbname=ducklake user=ducklake password=ducklake host=ducklake-catalog port=5432"
    PYTHONPATH: /app/src
    # OTEL_EXPORTER_OTLP_ENDPOINT is set by the overlay (dev -> SigNoz collector,
    # prod -> external collector), so the base stays environment-neutral.
  volumes:
    # Persisted data + a shared Dagster home (webserver + daemon see the same
    # runs/schedules). The source tree is baked into the image (Dockerfile
    # COPY . .); the dev overlay bind-mounts it back for live reload.
    - ./data:/app/data
    - dagster_home:/app/.dagster

services:
  # Dagster UI (asset graph, runs, logs). Reachable from another machine on :3000.
  # Loads the SAME workspace.yaml as the daemon so queued runs can be launched.
  dagster-webserver:
    <<: *app
    depends_on:
      ducklake-catalog:
        condition: service_healthy
    command: >
      sh -c "cd /app/dbt/data_platform && dbt parse --profiles-dir . &&
             cd /app && dagster-webserver -h 0.0.0.0 -p 3000 -w /app/workspace.yaml"
    ports:
      - "${DAGSTER_UI_PORT:-3000}:3000"

  # Dagster daemon: runs schedules, sensors, and the run queue. MUST load the same
  # workspace.yaml as the webserver, or it dequeues runs into an empty workspace and
  # fails with "Location data_platform.definitions does not exist in workspace".
  dagster-daemon:
    <<: *app
    depends_on:
      ducklake-catalog:
        condition: service_healthy
    command: >
      sh -c "cd /app/dbt/data_platform && dbt parse --profiles-dir . &&
             cd /app && dagster-daemon run -w /app/workspace.yaml"

  # JupyterLab, reachable from another machine on :8888 (token-protected).
  jupyter:
    <<: *app
    command: >
      sh -c "jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root
             --ServerApp.root_dir=/app --IdentityProvider.token=$${JUPYTER_TOKEN}"
    ports:
      - "${JUPYTER_PORT:-8888}:8888"

  # Matchbook odds tick ingestor — reads matchbook_odds_stream from Redis
  # (provided by the external sports-gaming-engine stack) and writes ZSTD
  # Parquet to data/bronze/matchbook_odds/. Redis is NOT started here.
  matchbook-ingestor:
    <<: *app
    command: python -m data_platform.matchbook.ingestor.direct_parquet_consumer
    environment:
      MATCHBOOK_REDIS_HOST: ${MATCHBOOK_REDIS_HOST:-redis}
      MATCHBOOK_REDIS_PORT: ${MATCHBOOK_REDIS_PORT:-6379}
    networks:
      - sports-quant
    restart: unless-stopped

  # PostgreSQL catalog for DuckLake. All overlays inherit this service.
  # Dev credentials — override POSTGRES_CATALOG_URL in .env for production.
  ducklake-catalog:
    image: postgres:16
    environment:
      POSTGRES_DB: ducklake
      POSTGRES_USER: ducklake
      POSTGRES_PASSWORD: ducklake
    volumes:
      - ducklake_catalog:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ducklake"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # DuckDB UI — browser SQL interface at http://localhost:4213
  # Opens warehouse.duckdb READ_ONLY (single-writer constraint preserved).
  # Also attaches the DuckLake catalog for browsing catalog-managed tables.
  duckdb-ui:
    image: duckdb/duckdb:latest
    ports:
      - "4213:4213"
    volumes:
      - ./data:/app/data:ro
    depends_on:
      ducklake-catalog:
        condition: service_healthy
    entrypoint:
      - duckdb
      - -cmd
      - "INSTALL ui; LOAD ui; INSTALL postgres; LOAD postgres; INSTALL ducklake; LOAD ducklake; ATTACH '/app/data/warehouse.duckdb' AS warehouse (READ_ONLY); ATTACH 'ducklake:postgres:dbname=ducklake user=ducklake password=ducklake host=ducklake-catalog port=5432' AS lake (DATA_PATH '/app/data/lake/'); CALL start_ui();"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:4213 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  dagster_home:
  ducklake_catalog:

networks:
  sports-quant:
    external: true
