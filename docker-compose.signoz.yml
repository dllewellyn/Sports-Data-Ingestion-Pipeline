# Self-hosted SigNoz stack (traces/metrics/logs backend + UI).
#
# Vendored, PINNED snapshot of SigNoz's self-host compose (v0.116.1). Upstream has
# DEPRECATED Compose in favour of their "Foundry" installer, so this won't auto-update
# — bump VERSION / OTELCOL_TAG in .env and re-pull ./signoz/** from the matching git
# tag to upgrade. Heavy: ClickHouse + Zookeeper want ~2-3 GB RAM.
#
# Brought up together with the app stack via COMPOSE_FILE in .env, so a bare
# `docker compose up -d` starts everything. UI on http://localhost:8080.
# Config files live under ./signoz/ (clickhouse + collector); paths below are
# relative to the project root (the dir holding docker-compose.yml).

x-common: &common
  networks:
    - signoz-net
  restart: unless-stopped
  logging:
    options:
      max-size: 50m
      max-file: "3"

x-clickhouse-defaults: &clickhouse-defaults
  <<: *common
  image: clickhouse/clickhouse-server:25.5.6
  tty: true
  depends_on:
    init-clickhouse:
      condition: service_completed_successfully
    zookeeper-1:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "wget", "--spider", "-q", "0.0.0.0:8123/ping"]
    interval: 30s
    timeout: 5s
    retries: 3
  ulimits:
    nproc: 65535
    nofile:
      soft: 262144
      hard: 262144
  environment:
    - CLICKHOUSE_SKIP_USER_SETUP=1

x-zookeeper-defaults: &zookeeper-defaults
  <<: *common
  image: signoz/zookeeper:3.7.1
  user: root
  healthcheck:
    test: ["CMD-SHELL", "curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null"]
    interval: 30s
    timeout: 5s
    retries: 3

x-db-depend: &db-depend
  <<: *common
  depends_on:
    clickhouse:
      condition: service_healthy

# Dev-only additions merged onto each app service from the base file:
# export OTLP to the in-stack SigNoz collector, join signoz-net, and bind-mount
# the source tree over the baked image for live reload.
x-dev-app: &dev-app
  environment:
    OTEL_EXPORTER_OTLP_ENDPOINT: http://signoz-otel-collector:4317
  networks:
    - signoz-net
  volumes:
    - ./src:/app/src
    - ./dbt:/app/dbt
    - ./notebooks:/app/notebooks

services:
  # --- App services: dev overrides (merged onto docker-compose.yml) ---
  dagster-webserver:
    <<: *dev-app
  dagster-daemon:
    <<: *dev-app
  jupyter:
    <<: *dev-app

  # --- Self-hosted SigNoz stack ---
  # One-shot: fetches the histogram-quantile UDF binary into ClickHouse's
  # user_scripts (needs internet on first run).
  init-clickhouse:
    <<: *common
    image: clickhouse/clickhouse-server:25.5.6
    container_name: signoz-init-clickhouse
    command:
      - bash
      - -c
      - |
        version="v0.0.1"
        node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
        node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
        echo "Fetching histogram-binary for $${node_os}/$${node_arch}"
        cd /tmp
        wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
        tar -xvzf histogram-quantile.tar.gz
        mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
    restart: on-failure
    volumes:
      - ./signoz/common/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/

  zookeeper-1:
    <<: *zookeeper-defaults
    container_name: signoz-zookeeper-1
    volumes:
      - zookeeper-1:/bitnami/zookeeper
    environment:
      - ZOO_SERVER_ID=1
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_AUTOPURGE_INTERVAL=1

  clickhouse:
    <<: *clickhouse-defaults
    container_name: signoz-clickhouse
    volumes:
      - ./signoz/common/clickhouse/config.xml:/etc/clickhouse-server/config.xml
      - ./signoz/common/clickhouse/users.xml:/etc/clickhouse-server/users.xml
      - ./signoz/common/clickhouse/custom-function.xml:/etc/clickhouse-server/custom-function.xml
      - ./signoz/common/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/
      - ./signoz/common/clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
      - clickhouse:/var/lib/clickhouse/

  # SigNoz UI + query service. Open http://localhost:8080 once healthy.
  signoz:
    <<: *db-depend
    image: signoz/signoz:${VERSION:-v0.116.1}
    container_name: signoz
    ports:
      - "8080:8080"
    volumes:
      - sqlite:/var/lib/signoz/
    environment:
      - SIGNOZ_ALERTMANAGER_PROVIDER=signoz
      - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_SQLSTORE_SQLITE_PATH=/var/lib/signoz/signoz.db
      - SIGNOZ_TOKENIZER_JWT_SECRET=${SIGNOZ_JWT_SECRET:-secret}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # The collector the app services export OTLP to (gRPC 4317 / HTTP 4318).
  # Writes traces/metrics/logs straight into ClickHouse.
  signoz-otel-collector:
    <<: *db-depend
    image: signoz/signoz-otel-collector:${OTELCOL_TAG:-v0.144.2}
    container_name: signoz-otel-collector
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /signoz-otel-collector migrate sync check &&
        /signoz-otel-collector --config=/etc/otel-collector-config.yaml --manager-config=/etc/manager-config.yaml --copy-path=/var/tmp/collector-config.yaml
    volumes:
      - ./signoz/docker/otel-collector-config.yaml:/etc/otel-collector-config.yaml
      - ./signoz/common/signoz/otel-collector-opamp-config.yaml:/etc/manager-config.yaml
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=signoz-host,os.type=linux
      - LOW_CARDINAL_EXCEPTION_GROUPING=false
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver

  # One-shot: bootstraps + migrates the ClickHouse telemetry schemas, then exits.
  signoz-telemetrystore-migrator:
    <<: *db-depend
    image: signoz/signoz-otel-collector:${OTELCOL_TAG:-v0.144.2}
    container_name: signoz-telemetrystore-migrator
    environment:
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /signoz-otel-collector migrate bootstrap &&
        /signoz-otel-collector migrate sync up &&
        /signoz-otel-collector migrate async up
    restart: on-failure

networks:
  signoz-net:
    name: signoz-net

volumes:
  clickhouse:
    name: signoz-clickhouse
  sqlite:
    name: signoz-sqlite
  zookeeper-1:
    name: signoz-zookeeper-1
