receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
  # Ensure logs/metrics carry a stable service.name even if a client omits it.
  resource:
    attributes:
      - key: service.name
        value: claude-code
        action: insert

exporters:
  # Metrics -> Prometheus scrape endpoint on :8889.
  # add_metric_suffixes:false keeps names predictable for dashboards
  # (e.g. claude_code.token.usage -> claude_code_token_usage, no _total/unit suffix).
  prometheus:
    endpoint: 0.0.0.0:8889
    add_metric_suffixes: false
    resource_to_telemetry_conversion:
      enabled: true   # promote resource attrs (user.email, etc.) to metric labels

  # Logs/events -> Loki's native OTLP ingestion endpoint.
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

  # Traces (feature-run span tree, and Claude Code's beta traces if enabled) -> Tempo.
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Uncomment for raw stdout debugging of incoming signals.
  # debug:
  #   verbosity: detailed

service:
  telemetry:
    metrics:
      address: 0.0.0.0:8888
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/loki]
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlp/tempo]
