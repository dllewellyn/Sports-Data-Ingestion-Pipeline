auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Required for OTLP ingestion: Claude's event attributes land as structured metadata.
  allow_structured_metadata: true
  volume_enabled: true
  retention_period: 720h   # 30d
  # Promote the LOW-cardinality feature-run correlator `run_id` (a resource
  # attribute set by emit.py) to an index label so the Grafana dashboard can offer
  # a `run_id` dropdown and select a run cheaply. ignore_defaults:false keeps the
  # standard label set (service.name, …) so existing Claude Code dashboards are
  # unaffected. All other feature attributes (event_type, agent_id, role, phase,
  # git_*) and every Claude Code attribute stay as structured metadata, filterable
  # with `| key="…"`. (Loki only allows index_label on resource attributes.)
  otlp_config:
    resource_attributes:
      ignore_defaults: false
      attributes_config:
        - action: index_label
          attributes:
            - run_id

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100
