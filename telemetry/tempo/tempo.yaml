# Grafana Tempo — trace store for the feature-run span tree.
#
# Monolithic single-binary mode with local-disk storage (matches the local-dev
# posture of the rest of this stack). The OTel Collector forwards spans here over
# OTLP/gRPC on the Docker network (tempo:4317); Grafana queries it on :3200.
server:
  http_listen_port: 3200
  grpc_listen_port: 9096

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    # Match Prometheus/Loki 30-day retention so a run's trace outlives its commits.
    block_retention: 720h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
